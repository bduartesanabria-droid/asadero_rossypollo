{% extends "base.html" %}

{% block title %}Registrarse - Asadero Rossy Pollo{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 py-4 shadow-lg">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <span class="fs-1">🔥</span>
                        <h2 class="fw-bold mt-2 mb-1">Únete a la parrilla</h2>
                        <p class="text-muted small">Crea tu cuenta en Asadero Rossy Pollo</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Usuario</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-color"><i class="far fa-user text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="De 3 a 20 caracteres" minlength="3" maxlength="20" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-color"><i class="far fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control border-start-0" id="email" name="email" placeholder="correo@ejemplo.com" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-color"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password_confirm" class="form-label">Confirmar Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-color"><i class="fas fa-shield-alt text-muted"></i></span>
                                <input type="password" class="form-control border-start-0" id="password_confirm" name="password_confirm" placeholder="Repite la contraseña" minlength="6" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            Registrarse <i class="fas fa-user-plus ms-1"></i>
                        </button>
                    </form>
                </div>
                <div class="card-footer bg-transparent border-0 text-center pb-4">
                    <p class="mb-0 text-muted small">
                        ¿Ya tienes una cuenta? 
                        <a href="{{ url_for('auth.login') }}" class="fw-bold text-primary text-decoration-none">Inicia sesión aquí</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
