{% extends "base.html" %}
{% block title %}Registrarse - Rossypollo Mundial 2026{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center align-items-center g-5">
    <div class="col-md-5 d-none d-md-block">
      <div class="mascot-wrapper">
        <div class="mascot-3d" style="width:160px;height:220px;animation-duration:2s;">
          <div class="mascot-head-chicken" style="width:80px;height:80px;top:5px;">
            <div class="mascot-comb" style="width:30px;height:18px;top:-12px;"></div>
            <div class="mascot-eye left" style="width:10px;height:12px;top:28px;left:22px;"></div>
            <div class="mascot-eye right" style="width:10px;height:12px;top:28px;right:22px;"></div>
            <div class="mascot-beak" style="border-left-width:8px;border-right-width:8px;border-top-width:14px;bottom:18px;"></div>
          </div>
          <div class="mascot-body-chicken" style="width:90px;height:105px;bottom:30px;">
            <div class="mascot-wings left" style="width:30px;height:40px;left:-15px;"></div>
            <div class="mascot-wings right" style="width:30px;height:40px;right:-15px;"></div>
            <div class="mascot-shirt" style="width:100px;height:55px;font-size:1.5rem;">R</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card border-0 p-4">
        <div class="card-body p-md-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold">Únete a la competencia</h2>
            <p class="text-secondary">Crea tu cuenta y empieza a pronosticar</p>
          </div>
          <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-3">
              <label class="form-label">Nombre de Usuario</label>
              <div class="input-group">
                <span class="input-group-text"><i class="far fa-user"></i></span>
                <input type="text" class="form-control" name="username" placeholder="Tu usuario" minlength="3" maxlength="20" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Correo Electrónico</label>
              <div class="input-group">
                <span class="input-group-text"><i class="far fa-envelope"></i></span>
                <input type="email" class="form-control" name="email" placeholder="correo@ejemplo.com" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                <button class="input-group-text" type="button" onclick="togglePassword('password')"><i class="far fa-eye"></i></button>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Confirmar Contraseña</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-shield-alt"></i></span>
                <input type="password" class="form-control" id="password_confirm" name="password_confirm" placeholder="Repite la contraseña" minlength="6" required>
              </div>
            </div>
            <button type="submit" class="btn btn-yellow w-100 py-2" data-confetti="true">
              <i class="fas fa-user-plus me-2"></i>Registrarse
            </button>
          </form>
          <div class="text-center mt-4">
            <p class="mb-0 small text-secondary">
              ¿Ya tienes cuenta?
              <a href="{{ url_for('auth.login') }}" class="fw-bold text-decoration-none" style="color:var(--yellow);">Inicia sesión</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
