{% extends "base.html" %}
{% block title %}Iniciar Sesión - Rossypollo Mundial 2026{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center align-items-center g-5">
    <div class="col-md-5 d-none d-md-block">
      <div class="mascot-wrapper">
        <div class="mascot-3d" style="width:160px;height:220px;">
          <div class="mascot-head-chicken" style="width:80px;height:80px;top:5px;">
            <div class="mascot-comb" style="width:30px;height:18px;top:-12px;"></div>
            <div class="mascot-eye left" style="width:10px;height:12px;top:28px;left:22px;"></div>
            <div class="mascot-eye right" style="width:10px;height:12px;top:28px;right:22px;"></div>
            <div class="mascot-beak" style="border-left-width:8px;border-right-width:8px;border-top-width:14px;bottom:18px;"></div>
          </div>
          <div class="mascot-body-chicken" style="width:90px;height:105px;bottom:30px;">
            <div class="mascot-wings left" style="width:30px;height:40px;left:-15px;"></div>
            <div class="mascot-wings right" style="width:30px;height:40px;right:-15px;"></div>
            <div class="mascot-shirt" style="width:100px;height:55px;font-size:1.5rem;">R</div>
          </div>
          <div class="mascot-ball-area" style="width:40px;height:40px;bottom:10px;right:-20px;">
            <div class="mascot-soccer-ball" style="width:40px;height:40px;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card border-0 p-4">
        <div class="card-body p-md-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold">Bienvenido de nuevo</h2>
            <p class="text-secondary">Inicia sesión en Rossypollo Mundial</p>
          </div>
          <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
              <label class="form-label">Usuario o Email</label>
              <div class="input-group">
                <span class="input-group-text"><i class="far fa-user"></i></span>
                <input type="text" class="form-control" name="username" placeholder="usuario o correo" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                <button class="input-group-text" type="button" onclick="togglePassword('password')"><i class="far fa-eye"></i></button>
              </div>
            </div>
            <div class="mb-4 d-flex justify-content-between align-items-center">
              <div class="form-check">
                <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                <label class="form-check-label small" for="remember_me">Recuérdame</label>
              </div>
            </div>
            <button type="submit" class="btn btn-yellow w-100 py-2">
              <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
            </button>
          </form>
          <div class="text-center mt-4">
            <p class="mb-0 small text-secondary">
              ¿No tienes cuenta?
              <a href="{{ url_for('auth.register') }}" class="fw-bold text-decoration-none" style="color:var(--yellow);">Regístrate aquí</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
