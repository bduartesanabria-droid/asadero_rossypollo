{% extends "base.html" %}

{% block title %}Iniciar Sesión - Asadero Rossy Pollo{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 py-4 shadow-lg">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <span class="fs-1">🍗</span>
                        <h2 class="fw-bold mt-2 mb-1">Bienvenido de nuevo</h2>
                        <p class="text-muted small">Inicia sesión en Asadero Rossy Pollo</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Usuario</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-color"><i class="far fa-user text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="Tu nombre de usuario" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-color"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Tu contraseña" required>
                            </div>
                        </div>
                        
                        <div class="mb-4 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                                <label class="form-check-label text-muted small" for="remember_me">
                                    Recuérdame
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            Iniciar Sesión <i class="fas fa-sign-in-alt ms-1"></i>
                        </button>
                    </form>
                </div>
                <div class="card-footer bg-transparent border-0 text-center pb-4">
                    <p class="mb-0 text-muted small">
                        ¿No tienes cuenta todavía? 
                        <a href="{{ url_for('auth.register') }}" class="fw-bold text-primary text-decoration-none">Regístrate aquí</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
