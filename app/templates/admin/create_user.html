{% extends 'base.html' %}
{% block title %}Crear Usuario - Admin{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <div class="card-header bg-transparent border-bottom mb-3">
          <h4 class="fw-bold mb-0"><i class="fas fa-user-plus me-2" style="color:var(--yellow);"></i>Crear Nuevo Usuario</h4>
        </div>
        <div class="card-body">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Nombre de usuario</label>
              <input type="text" name="username" class="form-control" placeholder="Ej: juan123" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Correo electrónico</label>
              <input type="email" name="email" class="form-control" placeholder="Ej: juan@email.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="mb-4 form-check">
              <input type="checkbox" name="is_admin" class="form-check-input" id="isAdminCheck">
              <label class="form-check-label" for="isAdminCheck">
                <i class="fas fa-shield-alt me-1" style="color:var(--yellow);"></i>Otorgar permisos de Superadmin
              </label>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-yellow"><i class="fas fa-save me-2"></i>Crear Usuario</button>
              <a href="{{ url_for('main.admin_users') }}" class="btn btn-outline-yellow">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
