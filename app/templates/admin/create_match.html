{% extends 'base.html' %}
{% block title %}Crear Partido - Admin{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <div class="card-header bg-transparent border-bottom mb-3">
          <h4 class="fw-bold mb-0"><i class="fas fa-plus-circle me-2" style="color:var(--yellow);"></i>Nuevo Partido</h4>
        </div>
        <div class="card-body">
          <form method="post" action="{{ url_for('main.create_match') }}">
            <div class="mb-3">
              <label class="form-label">Equipo Local</label>
              <input type="text" name="home_team" class="form-control" placeholder="Ej: Colombia" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Equipo Visitante</label>
              <input type="text" name="away_team" class="form-control" placeholder="Ej: Brasil" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Fecha y Hora</label>
              <input type="datetime-local" name="match_date" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Grupo (opcional)</label>
              <input type="text" name="group" class="form-control" placeholder="Ej: A">
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-yellow"><i class="fas fa-save me-2"></i>Crear</button>
              <a href="{{ url_for('main.admin_matches') }}" class="btn btn-outline-yellow">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
