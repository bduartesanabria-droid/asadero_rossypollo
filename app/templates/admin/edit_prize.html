{% extends 'base.html' %}
{% block title %}Editar Premio - Admin{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <div class="card-header bg-transparent border-bottom mb-3">
          <h4 class="fw-bold mb-0"><i class="fas fa-edit me-2" style="color:var(--yellow);"></i>Editar Premio</h4>
        </div>
        <div class="card-body">
          <form method="POST" class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nombre</label>
              <input type="text" name="name" class="form-control" value="{{ prize.name }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Fase</label>
              <input type="text" name="phase" class="form-control" value="{{ prize.phase }}" required>
            </div>
            <div class="col-12">
              <label class="form-label">Descripción</label>
              <textarea name="description" class="form-control" rows="3" required>{{ prize.description }}</textarea>
            </div>
            <div class="col-12">
              <label class="form-label">URL Imagen</label>
              <input type="url" name="image_url" class="form-control" value="{{ prize.image_url or '' }}">
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-yellow"><i class="fas fa-save me-2"></i>Actualizar</button>
              <a href="{{ url_for('main.admin_prizes') }}" class="btn btn-outline-yellow ms-2">Volver</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
