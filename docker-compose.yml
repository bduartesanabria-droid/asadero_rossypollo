version: '3.8'

services:
  app:
    build: .
    container_name: asadero_rossypollo
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Variables fijas hardcodeadas aquí directamente
      FLASK_APP: run.py
      FLASK_ENV: production
      DEBUG: "False"
      HOST: "0.0.0.0"
      PORT: "5000"
      PYTHONUNBUFFERED: "1"
    volumes:
      - instance_data:/app/instance
    restart: unless-stopped

volumes:
  instance_data:
