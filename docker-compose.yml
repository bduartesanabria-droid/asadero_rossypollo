version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asadero_rossypollo_app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: run.py
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///asadero.db}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      # Solo persistir la base de datos SQLite, NO el código fuente
      - instance_data:/app/instance
    command: python run.py
    restart: unless-stopped
    networks:
      - asadero_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  asadero_network:
    driver: bridge

volumes:
  instance_data:
    driver: local
