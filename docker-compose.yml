version: '3.8'

services:
  app:
    build: .
    container_name: asadero_rossypollo
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # If no DATABASE_URL provided, default to MySQL service below.
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://${MYSQL_USER:-asaderouser}:${MYSQL_PASSWORD:-password}@db:3306/${MYSQL_DATABASE:-asadero}}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-5000}
    volumes:
      - instance_data:/app/instance
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: asadero_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-asadero}
      MYSQL_USER: ${MYSQL_USER:-asaderouser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  instance_data:
  db_data:
