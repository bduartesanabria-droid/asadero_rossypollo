version: '3.8'

services:
  app:
    build: .
    container_name: asadero_rossypollo
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/instance/asadero.db}
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: ${FLASK_ENV:-production}
      DEBUG: ${DEBUG:-False}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-5000}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - instance_data:/app/instance
    restart: unless-stopped

volumes:
  instance_data:
