version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asadero_rossypollo_app
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_APP: run.py
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/instance
    command: python run.py
    restart: unless-stopped
    networks:
      - asadero_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  asadero_network:
    driver: bridge

volumes:
  instance:
    driver: local
