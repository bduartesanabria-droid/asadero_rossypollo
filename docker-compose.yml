version: '3.8'

services:
  app:
    build: .
    container_name: asadero_rossypollo
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///asadero.db}
    volumes:
      - instance_data:/app/instance
    restart: unless-stopped

volumes:
  instance_data:
